<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デザイン指示プロンプト集</title>
  <style>
    :root {
      --color-bg: #0a0a0a;
      --color-surface: #141414;
      --color-surface-2: #1e1e1e;
      --color-border: #2a2a2a;
      --color-text: #e5e5e5;
      --color-text-sub: #999;
      --color-text-muted: #666;
      --color-primary: #6366f1;
      --color-primary-soft: rgba(99, 102, 241, 0.12);
      --color-accent: #818cf8;
      --color-code-bg: #1a1a2e;
      --color-success: #34d399;
      --radius: 12px;
      --font-sans: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --max-width: 860px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.8;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Header --- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    .header-badge {
      font-size: 11px;
      padding: 4px 10px;
      background: var(--color-primary-soft);
      color: var(--color-accent);
      border-radius: 20px;
      font-weight: 600;
    }

    /* --- Hero --- */
    .hero {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 24px 48px;
      text-align: center;
    }

    .hero-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-accent);
      background: var(--color-primary-soft);
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 16px;
      color: var(--color-text-sub);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* --- TOC --- */
    .toc {
      max-width: var(--max-width);
      margin: 0 auto 48px;
      padding: 0 24px;
    }

    .toc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .toc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--color-text);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .toc-item:hover {
      background: var(--color-surface-2);
      border-color: var(--color-primary);
      transform: translateY(-1px);
    }

    .toc-num {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--color-primary-soft);
      color: var(--color-accent);
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* --- Main Content --- */
    .content {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px 120px;
    }

    /* --- Section --- */
    .section {
      margin-bottom: 64px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-border);
    }

    .section-num {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--color-primary);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    /* --- Prompt Card --- */
    .prompt-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }

    .prompt-card:hover {
      border-color: #3a3a3a;
    }

    .prompt-card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .prompt-card-header:hover {
      background: var(--color-surface-2);
    }

    .prompt-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .prompt-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .prompt-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      font-weight: 600;
    }

    .tag-usage {
      background: rgba(52, 211, 153, 0.1);
      color: var(--color-success);
    }

    .tag-industry {
      background: rgba(99, 102, 241, 0.1);
      color: var(--color-accent);
    }

    .prompt-toggle {
      color: var(--color-text-muted);
      font-size: 20px;
      flex-shrink: 0;
      transition: transform 0.3s ease;
      line-height: 1;
      user-select: none;
      margin-top: 4px;
    }

    .prompt-card.open .prompt-toggle {
      transform: rotate(45deg);
    }

    .prompt-card-body {
      display: none;
      padding: 24px;
    }

    .prompt-card.open .prompt-card-body {
      display: block;
    }

    /* --- Code Block --- */
    .code-block {
      position: relative;
      background: var(--color-code-bg);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 10px;
      overflow: hidden;
    }

    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(99, 102, 241, 0.06);
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .code-block-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: var(--color-text-sub);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--color-text);
    }

    .copy-btn.copied {
      color: var(--color-success);
      border-color: rgba(52, 211, 153, 0.3);
    }

    .code-block pre {
      padding: 20px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* --- Guide Table --- */
    .guide-section {
      margin-top: 80px;
    }

    .guide-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 14px;
    }

    .guide-table th {
      text-align: left;
      padding: 14px 18px;
      background: var(--color-surface-2);
      color: var(--color-text-sub);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--color-border);
    }

    .guide-table td {
      padding: 12px 18px;
      border-bottom: 1px solid var(--color-border);
      color: var(--color-text);
    }

    .guide-table tr:last-child td {
      border-bottom: none;
    }

    .guide-table td:first-child {
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .guide-table td:last-child {
      color: var(--color-accent);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      .hero { padding: 56px 20px 36px; }
      .toc-grid { grid-template-columns: 1fr; }
      .content { padding: 0 16px 80px; }
      .prompt-card-header { padding: 16px; }
      .prompt-card-body { padding: 16px; }
      .code-block pre { padding: 14px; font-size: 12px; }
      .section-header { gap: 10px; }
      .section-title { font-size: 18px; }
      .guide-table { font-size: 13px; }
      .guide-table th, .guide-table td { padding: 10px 12px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

  <div class="hero">

    <h1>デザイン指示プロンプト集</h1>
    <p>余白・コントラスト・スケール・アラインメント・配色・タイポグラフィ・ビジュアルヒエラルキーの7原則に基づく実務プロンプト</p>

  <nav class="toc">
    <div class="toc-grid">

  </nav>

  <main class="content" id="prompts-container"></main>

  <script>
    const DATA = [
      {
        id: 1,
        title: "ブランドデザイン",
        subtitle: "Brand Design",
        prompts: [
          {
            name: "1-1. カラーパレット策定",
            usage: "新規ブランド立ち上げ・リブランディング時",
            industry: "SaaS / EC / コーポレート / 営業資料",
            body: `あなたはシニアブランドデザイナーです。以下の要件に基づき、プロフェッショナルなカラーパレットを策定してください。

## ブランド情報
- ブランド名: {{ブランド名}}
- 業種: {{SaaS / EC / コーポレート / その他}}
- ブランドパーソナリティ: {{例: 信頼性・先進性・親しみやすさ}}
- 競合他社の主要カラー: {{例: 競合A=#0066FF, 競合B=#FF6600}}

## 出力要件
以下の構成でカラーパレットを設計してください：

1. **プライマリカラー**（1色）
   - HEX, RGB, HSL値
   - 選定理由（ブランドパーソナリティとの関連）

2. **セカンダリカラー**（1〜2色）
   - プライマリとの調和根拠（補色・類似色・トライアドなど配色理論を明記）

3. **アクセントカラー**（1色）
   - CTA・重要アクションに使用する高コントラストカラー

4. **ニュートラルカラー**（5段階）
   - 背景・テキスト・ボーダー用のグレースケール
   - 50, 100, 300, 600, 900の5段階

5. **セマンティックカラー**
   - Success / Warning / Error / Info の4色

6. **アクセシビリティチェック**
   - 全テキスト×背景の組み合わせでWCAG AA以上のコントラスト比を保証
   - コントラスト比の数値を併記

## 制約
- 競合と明確に差別化できるカラーを選定すること
- デジタル（Web/アプリ）と印刷物の両方で再現性が高いこと`
          },
          {
            name: "1-2. タイポグラフィシステム設計",
            usage: "ブランド全体のフォント体系を統一する際",
            industry: "SaaS / EC / コーポレート / 営業資料",
            body: `あなたはタイポグラフィの専門家です。以下の要件でブランドのタイポグラフィシステムを設計してください。

## ブランド情報
- ブランド名: {{ブランド名}}
- 業種: {{SaaS / EC / コーポレート}}
- トーン: {{例: モダン＆クリーン / 温かみ＆親しみやすい / フォーマル＆信頼感}}
- 使用環境: {{Web / アプリ / 印刷物 / 全て}}

## 出力要件

1. **フォントファミリー選定**
   - 見出し用フォント（日本語 + 英語）
   - 本文用フォント（日本語 + 英語）
   - 選定理由（可読性・ブランドトーンとの整合性）
   - Google Fonts / Adobe Fonts等の入手方法

2. **タイプスケール**（Modular Scale）
   - ベースサイズ: 16px
   - スケール比率を明記（例: 1.250 Major Third）
   - H1〜H6、本文、キャプション、ラベルの各サイズ（px / rem）
   - 各レベルのfont-weight指定

3. **行間・字間ルール**
   - 見出し: line-height, letter-spacing
   - 本文: line-height, letter-spacing
   - 日本語テキストの最適行長（文字数/行）

4. **レスポンシブ対応**
   - モバイル / タブレット / デスクトップでのサイズ調整ルール
   - CSS clamp() を使った流体タイポグラフィの推奨値`
          },
          {
            name: "1-3. ブランドガイドライン生成",
            usage: "デザインの一貫性を保つためのガイドライン文書作成",
            industry: "SaaS / EC / コーポレート",
            body: `あなたはブランドストラテジストです。以下の情報をもとに、実務で即使えるブランドガイドラインを作成してください。

## 入力情報
- ブランド名: {{ブランド名}}
- ミッション/ビジョン: {{一文で記述}}
- カラーパレット: {{プライマリ=#XXXXXX, セカンダリ=#XXXXXX, アクセント=#XXXXXX}}
- フォント: {{見出し=〇〇, 本文=〇〇}}
- ロゴ: {{ロゴの簡単な説明。あれば画像を添付}}

## 出力構成

1. **ブランドコンセプト**（100字以内）
2. **ロゴ使用ルール**
   - 最小サイズ、余白（クリアスペース）規定
   - 禁止事項（変形・色変更・背景制約）
3. **カラー使用ルール**
   - 各カラーの使用場面と比率（60-30-10ルール適用）
   - 背景×テキストの許可される組み合わせ一覧
4. **タイポグラフィ使用ルール**
   - 見出し・本文・キャプションの使い分け
5. **写真・イラストのトーン**
   - 推奨スタイル、フィルター、禁止表現
6. **ボイス＆トーン**
   - ブランドの言葉遣いの指針（カジュアル度、専門用語の扱い等）
7. **NG集**
   - よくある間違いと正しい使用例の対比`
          }
        ]
      },
      {
        id: 2,
        title: "カラー設計",
        subtitle: "Color Theory",
        prompts: [
          {
            name: "2-1. 配色設計＋アクセシビリティ対応",
            usage: "Webサイト・アプリ・資料の配色を設計する際",
            industry: "SaaS / EC / コーポレート / 営業資料",
            body: `あなたはUIカラーデザインの専門家です。以下のプロジェクトの配色を設計してください。

## プロジェクト情報
- 種類: {{LP / コーポレートサイト / ECサイト / 営業資料 / Webアプリ}}
- ブランドカラー: {{プライマリ=#XXXXXX}}
- ターゲットユーザー: {{例: 30〜40代のビジネスパーソン}}
- 与えたい印象: {{例: 信頼感と先進性}}

## 出力要件

1. **メイン配色（5色以内）**
   - 各色のHEX値と使用用途
   - 配色理論の根拠（補色・分裂補色・類似色・トライアドのいずれか）

2. **UI用途別カラーマッピング**
   | 用途 | カラー | HEX | コントラスト比 |
   |------|--------|-----|----------------|
   | 背景（メイン） | | | |
   | 背景（セクション交互） | | | |
   | テキスト（見出し） | | | |
   | テキスト（本文） | | | |
   | テキスト（サブ） | | | |
   | CTA ボタン | | | |
   | CTA ボタンテキスト | | | |
   | リンク | | | |
   | ボーダー / 区切り線 | | | |

3. **コントラスト比検証**
   - テキスト×背景の全組み合わせでWCAG AA（4.5:1以上）を満たすこと
   - 大テキスト（18px以上太字 or 24px以上）はAA Large（3:1以上）でも可
   - 不合格の組み合わせがあれば代替案を提示

4. **配色の使用比率**
   - 60%: ベースカラー（背景・余白）
   - 30%: メインカラー（コンテンツ・構造）
   - 10%: アクセントカラー（CTA・強調）`
          },
          {
            name: "2-2. ダーク/ライトモード対応配色",
            usage: "ダークモード対応が必要なWebアプリ・サービスの配色設計",
            industry: "SaaS / Webアプリ",
            body: `あなたはUIデザインの配色専門家です。以下のライトモード配色をベースに、ダークモード配色を設計してください。

## ライトモードの既存配色
- 背景: {{#FFFFFF}}
- テキスト（主）: {{#1A1A1A}}
- テキスト（副）: {{#6B7280}}
- プライマリ: {{#XXXXXX}}
- セカンダリ: {{#XXXXXX}}
- アクセント: {{#XXXXXX}}
- ボーダー: {{#E5E7EB}}

- Warning: {{#F59E0B}}
- Error: {{#EF4444}}

## 出力要件

1. **ダークモード配色一覧**

   - 背景は純黒（#000）ではなくダークグレー系を推奨（目の負担軽減）

3. **CSS変数マッピング**
   :root { /* ライトモード */ }
   @media (prefers-color-scheme: dark) { /* ダークモード */ }

4. **注意事項**
   - 全テキスト×背景の組み合わせでWCAG AA以上を保証
   - セマンティックカラー（Success/Warning/Error）はダーク背景で彩度を下げすぎないこと`
          }
        ]
      },
      {
        id: 3,
        title: "タイポグラフィ",
        subtitle: "Typography",
        prompts: [
          {
            name: "3-1. 見出し階層（Type Scale）設計",
            usage: "Webページ・LP・資料の見出し体系を統一する際",

    function render() {
      const container = document.getElementById('prompts-container');
      let html = '';

      DATA.forEach(section => {
        html += `<div class="section" id="section-${section.id}">`;
        html += `<div class="section-header">
          <span class="section-num">${section.id}</span>
          <h2 class="section-title">${section.title}<span style="color:var(--color-text-muted);font-weight:400;font-size:14px;margin-left:10px">${section.subtitle}</span></h2>
        </div>`;

        section.prompts.forEach((prompt, i) => {
          const cardId = `card-${section.id}-${i}`;
          html += `<div class="prompt-card" id="${cardId}">
            <div class="prompt-card-header" onclick="toggleCard('${cardId}')">
              <div>
                <div class="prompt-name">${prompt.name}</div>
                <div class="prompt-meta">
                  <span class="prompt-tag tag-usage">${prompt.usage}</span>
                  <span class="prompt-tag tag-industry">${prompt.industry}</span>
                </div>
              </div>
              <span class="prompt-toggle">+</span>
            </div>
            <div class="prompt-card-body">
              <div class="code-block">
                <div class="code-block-header">
                  <span class="code-block-label">Prompt</span>
                  <button class="copy-btn" onclick="copyPrompt(this, '${cardId}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Copy
                  </button>
                </div>
                <pre>${escapeHtml(prompt.body)}</pre>
              </div>
            </div>
          </div>`;
        });

        html += '</div>';
      });

      // Guide table
      html += `<div class="guide-section">
        <div class="section-header">
          <span class="section-num" style="background:var(--color-success)">G</span>
          <h2 class="section-title">プロンプト組み合わせガイド</h2>
        </div>
        <table class="guide-table">
          <thead><tr><th>シーン</th><th>使うプロンプト（順番）</th></tr></thead>
          <tbody>`;
      GUIDE_DATA.forEach(row => {
        html += `<tr><td>${row.scene}</td><td>${row.prompts}</td></tr>`;
      });
      html += `</tbody></table></div>`;

      container.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleCard(id) {
      document.getElementById(id).classList.toggle('open');
    }

    function copyPrompt(btn, cardId) {
      const pre = document.querySelector(`#${cardId} .code-block pre`);
      navigator.clipboard.writeText(pre.textContent).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
        }, 2000);
      });
    }

    render();
  </script>
